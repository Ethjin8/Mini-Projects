<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="wrapper">
        <div class="card">
            <div class="search">
                <input type="text" id="search-bar" placeholder="Enter city name" spellcheck="false">
                <button id="search-button"><img src="images/search.png"></button>
            </div>
            <div class="error">
                <p>Invalid City Name!</p>
            </div>
        </div>
        <div class="weather">
            <img id="weather-icon" src="images/clouds.png" class="weather-icon">
            <h2 class="location"></h2>
            <h2 class="temperature"></h2>
            <div class="attributes">
                <div class="humidity">
                    <img src="images/humidity.png" id="humidity-icon">
                    <div id="humidity-info">
                        <h3 id="humidity-percentage"></h3>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="windspeed">
                    <img src="images/wind.png" id="windspeed-icon">
                    <div id="wind-info">
                        <h3 id="wind-speed"></h3>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>

<script src="app.js"></script>
<script>
    const searchInput = document.getElementById("search-bar")
    const searchBtn = document.getElementById("search-button")

    searchBtn.addEventListener("click", () => {
        handleSearch(searchInput.value);
    });

    searchInput.addEventListener("keypress", (event) => {
        if (event.key == "Enter") {
            handleSearch(searchInput.value);
        }
    });

    async function handleSearch(location) {
        try {
            const data = await getWeatherData(location)
            document.querySelector(".location").textContent = data.location
            document.querySelector(".temperature").textContent = data.temperature + "°C"
            document.getElementById("humidity-percentage").textContent = data.humidity + "%"
            document.getElementById("wind-speed").textContent = data.wind_speed + " km/hr"

            if (data.weather_code == 0 || data.weather_code == 1) {
                document.getElementById("weather-icon").src = "images/clear.png"
            }
            else if (data.weather_code == 2 || data.weather_code == 3) {
                document.getElementById("weather-icon").src = "images/clouds.png"
            }
            else if (data.weather_code == 45 || data.weather_code == 48) {
                document.getElementById("weather-icon").src = "images/mist.png"
            }
            else if (data.weather_code >= 51 && data.weather_code <= 57) {
                document.getElementById("weather-icon").src = "images/drizzle.png"
            }
            else if (data.weather_code >= 61 && data.weather_code <= 67) {
                document.getElementById("weather-icon").src = "images/rain.png"
            }
            else if (data.weather_code >= 71 && data.weather_code <= 77) {
                document.getElementById("weather-icon").src = "images/snow.png"
            }
            else if (data.weather_code >= 80 && data.weather_code <= 82) {
                document.getElementById("weather-icon").src = "images/rain.png"
            }
            else if (data.weather_code == 85 || data.weather_code <= 86) {
                document.getElementById("weather-icon").src = "images/snow.png"
            }
            else {
                document.getElementById("weather-icon").src = "images/thunder.png";
            }

            document.querySelector(".weather").style.display = "flex";
            document.querySelector(".error").style.display = "none";
        } catch (error) {
            document.querySelector(".error").style.display = "block";
            console.log(error);
        }
    }
</script>

</html>
